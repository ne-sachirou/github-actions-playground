---
name: Lint GitHub Actions

"on":
  workflow_call:

jobs:
  lint-gha-reviewdog:
    name: lint-gha-reviewdog
    permissions:
      checks: write
      contents: read
      pull-requests: write
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ne-sachirou/lint-gha-reviewdog@ef912fb73025b91707d65f304f6942ef066940c2 # v0.0.5
        with:
          fail_on_error: true
          github_token: ${{github.token}}

  yamllint:
    name: yamllint
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: reviewdog/action-yamllint@f01d8a48fd8d89f89895499fca2cff09f9e9e8c0 # v1.21.0
        with:
          fail_level: error
          github_token: ${{github.token}}
          reporter: github-pr-review
