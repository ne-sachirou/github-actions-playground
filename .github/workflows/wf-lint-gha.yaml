---
name: Lint GitHub Actions

"on":
  workflow_call:

jobs:
  lint-gha-reviewdog:
    name: lint-gha-reviewdog
    permissions:
      checks: write
      contents: read
      pull-requests: write
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ne-sachirou/lint-gha-reviewdog@51ee9eb7560991bb1523053563eab21e04ea4729 # v0.0.7
        with:
          fail_on_error: true
          github_token: ${{github.token}}

  yamllint:
    name: yamllint
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: reviewdog/action-yamllint@e02a49fdf53f51ddd8dfa89b09aa975043aeba38 # v1.23.0
        with:
          fail_level: error
          github_token: ${{github.token}}
          reporter: github-pr-review
